<!DOCTYPE html> 
<html>
<head>
<title>purple-test.html</title>
<style>
.yellow {color:yellow;}
.white {color:white;}
.blend {background-color:black;color:white;border-color:black;}
.bullet-sprite { width: 20px; height: 20px; }
@font-face { font-family: 'DeterminationMono'; src: url('font/DeterminationMonoWebRegular-Z5oq.ttf') format('truetype'); }
body {height:100vh; margin: 0; background-color:black; position: relative; font-family: 'DeterminationMono', monospace; }
#gameContainer {width: 1050px; position: absolute; left: 400px; display: flex; flex-direction: column; box-sizing: border-box;}
#hp-section { display: flex; justify-content: center; color: white; font-family: 'DeterminationMono', monospace; margin-top: 0px;}
#hp-display-group { display: flex; flex-direction: column; align-items: center; margin-left: 30px;}
#hp-container { width: 300px; height: 60px; background-color: #c00; margin: 0 10px;}
#hp-bar { width: 100%; height: 100%; background-color: #ffff00;}
#hp-text { font-size: 48px; }
</style>
</head>
<body style="background-color:black; position: relative; overflow: hidden;">
<div id="debug" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: lime; font-family: monospace; padding: 10px; border: 1px solid lime; z-index: 1000; font-size: 14px; pointer-events: none;">
</div>
<div id="gameContainer">
<img src="sprites/soul-07.png" width="32" height="32" id="myPlayer01" style="position: absolute; left: 284px; top: 134px; opacity: 1.0; z-index: 100;">
<div id="purpleLine1" style="position: absolute; width: 600px; height: 8px; background-color: purple; top: 400px; left: 250px;"></div>
<div id="purpleLine2" style="position: absolute; width: 600px; height: 8px; background-color: purple; top: 500px; left: 250px;"></div>
<div id="purpleLine3" style="position: absolute; width: 600px; height: 8px; background-color: purple; top: 600px; left: 250px;"></div>
<div id="hp-section"> 
<div id="hp-display-group">
<input type="button" onClick="startAttackOne()"
<div id="hp-text-wrapper">
<span style="font-size:48px;">HP:</span>
<span id="hp-text">Infinite</span>
</div>
<div id="hp-container">
<div id="hp-bar"></div>
</div>
</div>
</div>
<script>
let enemyContainer = document.getElementById('enemyContainer');
let gameContainer = document.getElementById('gameContainer');
let playerElement = document.getElementById('myPlayer01');
let maxHoriz;
let maxVerti;
let showDebug = false;
let myHoriz = 513
let myVerti = 492
let vertiLock1 = parseInt(document.getElementById('purpleLine1').style.top) - 10;  //+ 'px';
let vertiLock2 = parseInt(document.getElementById('purpleLine2').style.top) - 10;  //+ 'px';
let vertiLock3 = parseInt(document.getElementById('purpleLine3').style.top) - 10;  //+ 'px'; 
let currentVertiLock = 2;
let up = false;
let down = false;
let right = false;
let left = false;
let wKeyDebounced = false;
let sKeyDebounced = false;
let actionKeyPressed = false;
let isAttackOne = false;
let isInvincible = false;
let isTrueInvincible = false;
let playerHealth = Infinity;
let containerRect = gameContainer.getBoundingClientRect();
let bullets = [];
let bulletSpawner;
let bulletTimer = 375;
let targetCenter = 480;
document.onkeydown = function(event){
if (event.key === "w"){
up = true;
if (currentVertiLock === 3 && !wKeyDebounced) {
wKeyDebounced = true;
currentVertiLock = 2
}
if (currentVertiLock === 2 && !wKeyDebounced) {
wKeyDebounced = true;
currentVertiLock = 1
}
}
if (event.key === "s"){
down = true;
if (currentVertiLock === 1 && !sKeyDebounced) {
sKeyDebounced = true;
currentVertiLock = 2
}
if (currentVertiLock === 2 && !sKeyDebounced) {
sKeyDebounced = true;
currentVertiLock = 3
}
}
if (event.key === "a"){
left = true;
}
if (event.key === "d"){
right = true;
}
if (event.ctrlKey && event.key === "q"){
showDebug = !showDebug;
const debugElement = document.getElementById('debug');
if (showDebug) {
debugElement.style.display = 'block';
} else {debugElement.style.display = 'none';}
}    
}
document.onkeyup = function(event){
if (event.key === "w"){up = false; wKeyDebounced = false;}
if (event.key === "s"){down = false; sKeyDebounced = false;}
if (event.key === "a"){left = false;}
if (event.key === "d"){right = false;}
}
function movement() {
updateDebug();
if (left) { myHoriz -= 3; }
if (right) { myHoriz += 3; }
if (myHoriz < 0) { myHoriz = 0; }
if (myVerti < 0) { myVerti = 0; }
if (myHoriz < 234) {myHoriz = 234}
if (myHoriz > 831) {myHoriz = 831}
if(currentVertiLock === 1){playerElement.style.top = vertiLock1 + 'px'}
if(currentVertiLock === 2){playerElement.style.top = vertiLock2 + 'px'}
if(currentVertiLock === 3){playerElement.style.top = vertiLock3 + 'px'} 
moveBullets();
//playerElement.style.top = myVerti + 'px';
playerElement.style.left = myHoriz + 'px';
}
function updateDebug() {
const debugElement = document.getElementById('debug');
if (!showDebug){debug.style.display = 'none'}
else if (showDebug){debug.style.display = 'block'}
if (!debugElement) return;
debugElement.innerHTML = `
---------------- <br>
Game Variables<br>
Bullet spawnrate: ${bulletTimer}<br>
VertiLock1: ${vertiLock1}<br>
VertiLock2: ${vertiLock2}<br>
VertiLock3: ${vertiLock3}<br>
---------------- <br>
Player Variables<br>
Up: ${up}<br>
Left: ${left}<br>
Down: ${down}<br>
Right: ${right}<br>
wKeyDebounced: ${wKeyDebounced}<br>
sKeyDebounced: ${sKeyDebounced}<br>
CurrentVertiLock: ${currentVertiLock}<br>
X: ${myHoriz}<br>
Y: ${playerElement.style.top}<br>
Health: ${playerHealth - 'px'}<br>
`;
}
function updateUI() {
let healthPercent = (playerHealth / maxHealth) * 100;
if (healthPercent < 0) {
healthPercent = 0;
}
let hpBar = document.getElementById("hp-bar");
hpBar.style.width = healthPercent + "%";
let hpText = document.getElementById("hp-text");
hpText.innerText = playerHealth + " / " + maxHealth;
}
function takeDamage(damageAmount) {
if (isTrueInvincible){return;}
else if (!isInvincible && playerHealth > 0) {
playerHealth -= damageAmount;
isInvincible = true;
playerElement.style.opacity = 0.5;
setTimeout(function() {
isInvincible = false;
playerElement.style.opacity = 1.0;
}, 1000);
}
}
function startAttackOne() {
clearInterval(bulletSpawner);
bullets = [];
playerElement.style.left = myHoriz + 'px';
playerElement.style.top = myVerti + 'px';
bulletSpawner = setInterval(spawnbullet, bulletTimer);
isAttackOne = true;
}
function spawnbullet() {
let bullet = document.createElement('img');
bullet.style.position = 'absolute';
let randomX = Math.random() * 160;      
bullet.style.left = randomX + 'px';
bullet.style.top = '-20px';
textBox.appendChild(bullet);
bullets.push({
element: bullet,
x: randomX,
y: -20
});
bullet.src = 'sprites/placeholder-bullet.png';
bullet.classList.add('bullet-sprite');
}
function moveBullets() {
bullets.forEach(bullet => {
bullet.y += 3;
bullet.element.style.top = bullet.y + 'px';
if (bullet.y > 200) {
bullet.element.remove();
}
if (!isInvincible) {
if (bullet.x + 10 > myHoriz + 2 && 
bullet.x + 10 < myHoriz + 30 &&
bullet.y + 10 > myVerti + 2 && 
bullet.y + 10 < myVerti + 30) {
takeDamage(0);
bullet.element.remove();
bullet.removed = true;
}
}
});
bullets = bullets.filter(bullet => bullet.y <= 200 && !bullet.removed);
}
function endAttackOne() {
if (isAttackOne) {
isAttackOne = false;
clearInterval(bulletSpawner);
gameContainer.appendChild(playerElement);
bullets.forEach(bullet => {
bullet.element.remove();
});
bullets = [];
};
}
}
function startBattle() {
setInterval(movement, 10)
//playerElement.style.top = myVerti + 'px'
playerElement.style.left = myHoriz + 'px'
}
startBattle();
</script>
</body>
</html>
